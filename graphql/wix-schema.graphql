# ──────────────────────────────────────────────
# COMMON / SHARED TYPES
# ──────────────────────────────────────────────

"""Standard paging input for offset-based pagination."""
input PagingInput {
  limit: Int
  offset: Int
}

"""Cursor-based paging input."""
input CursorPagingInput {
  limit: Int
  cursor: String
}

"""Unified query input used across most list/query endpoints."""
input QueryV2Input {
  filter: String
  sort: [SortingInput!]
  paging: PagingInput
  cursorPaging: CursorPagingInput
  fields: [String!]
}

input SortingInput {
  fieldName: String!
  order: SortOrder
}

enum SortOrder {
  ASC
  DESC
}

type PagingMetadata {
  count: Int
  offset: Int
  total: Int
  tooManyToCount: Boolean
  cursors: Cursors
}

type Cursors {
  next: String
  prev: String
}

type Money {
  amount: String
  currency: String
  formattedAmount: String
}

input MoneyInput {
  amount: String!
  currency: String!
}

type Image {
  id: ID
  url: String
  height: Int
  width: Int
  altText: String
  filename: String
}

input ImageInput {
  id: ID
  url: String!
  height: Int
  width: Int
  altText: String
  filename: String
}

type PageUrl {
  base: String
  path: String
}

type StreetAddress {
  number: String
  name: String
  apt: String
}

input StreetAddressInput {
  number: String
  name: String
  apt: String
}

type ApplicationError {
  code: String
  description: String
  data: String
}

