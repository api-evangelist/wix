  crmExtendedFieldsV4Fields(query: QueryV2Input): CrmExtendedFieldsResponse
  crmLabelsV4ContactLabel(key: String!): CrmLabel
  crmLabelsV4Labels(query: QueryV2Input): CrmLabelsResponse

  # Data (Cloud CMS)
  dataItemsV2DataItem(dataCollectionId: String!, id: ID!): DataItem
  dataItemsV2DataItems(dataCollectionId: String!, query: QueryV2Input): DataItemsResponse

  # Ecom
  ecomCartV1Cart(id: ID!): EcomCart
  ecomCurrentCartV1Cart: EcomCart
  ecomCheckoutV1Checkout(id: ID!): EcomCheckout
  ecomDiscountRulesV1DiscountRule(id: ID!): EcomDiscountRule
