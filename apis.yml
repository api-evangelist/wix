apis:
- aid: wix:rest-api
  name: Wix REST API
  description: The Wix REST API provides full programmatic access to all Wix platform
    capabilities via standard HTTP REST endpoints. The API covers eCommerce (stores,
    orders, catalog, payments, gift cards), bookings, CRM (contacts, members, forms),
    content (blog, events, restaurants, portfolio), business management (analytics,
    automations, calendar, notifications, payments), and account-level management
    (sites, domains, resellers). Authentication uses OAuth 2.0.
  humanURL: https://dev.wix.com/docs/rest
  tags:
  - CMS
  - CRM
  - eCommerce
  - REST
  properties:
  - type: Documentation
    url: https://dev.wix.com/docs/rest
  - type: Authentication
    url: https://dev.wix.com/docs/rest/articles/getting-started/api-authentication
  - url: graphql/wix-graphql.md
    type: GraphQL
- aid: wix:javascript-sdk
  name: Wix JavaScript SDK
  description: The Wix JavaScript SDK provides modular npm packages for accessing
    Wix business solutions and site data from JavaScript code. It supports Wix Sites,
    Wix Apps, and Wix Headless projects. Modules cover eCommerce, bookings, CRM, blog,
    events, stores, payments, and more.
  humanURL: https://dev.wix.com/docs/sdk
  tags:
  - JavaScript
  - Node.js
  - SDK
  properties:
  - type: Documentation
    url: https://dev.wix.com/docs/sdk
  - type: SDKs
    url: https://www.npmjs.com/org/wix
    title: Wix JavaScript SDK (npm)
- aid: wix:headless
  name: Wix Headless
  description: Wix Headless enables developers to use Wix business solutions as a
    backend while building custom frontends with any framework. It provides managed
    commerce, CRM, and content APIs accessible from any tech stack.
  humanURL: https://dev.wix.com/docs/go-headless
  tags:
  - Headless
  - Commerce
  - Frontend
  properties:
  - type: Documentation
    url: https://dev.wix.com/docs/go-headless
- aid: wix:webhooks
  name: Wix Webhooks
  description: The Wix webhook surface delivers signed JWT events to subscriber URLs
    registered in the Wix Dev Center. Events cover Stores (products, inventory, collections,
    variants), eCommerce (cart, checkout, abandoned checkout, orders, order transactions),
    Bookings v2 (bookings, services, legacy resource/schedule/category notifications),
    Members and Badges, Contacts v4 (and labels/extended fields), Forms submissions,
    Pricing Plans (plan and order lifecycle), Events v3 (events, RSVP, orders, reservations,
    ticket definitions, guests, policies), Blog posts and drafts, Coupons, Loyalty
    Program accounts and program, and app instance lifecycle. Payloads are JWTs that
    decode into a common envelope (id, entityFqdn, slug, entityId, eventTime, originatedFrom,
    triggeredByAnonymizeRequest) plus an event-specific payload.
  humanURL: https://dev.wix.com/docs/build-apps/develop-your-app/api-integrations/events-and-webhooks/about-webhooks
  tags:
  - Webhooks
  - AsyncAPI
  - Events
  properties:
  - type: Documentation
    url: https://dev.wix.com/docs/build-apps/develop-your-app/api-integrations/events-and-webhooks/about-webhooks
  - type: Documentation
    url: https://dev.wix.com/docs/rest/articles/getting-started/webhook-structure
    title: About the Structure of Webhooks
  - type: AsyncAPI
    url: https://raw.githubusercontent.com/api-evangelist/wix/refs/heads/main/asyncapi/wix-asyncapi.yml
