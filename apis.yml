- type: Features
  data:
  - name: eCommerce APIs
    description: Full store management including products, orders, payments, gift
      cards, and shipping via REST and SDK.
  - name: CRM APIs
    description: Manage site contacts, members, forms, automations, and loyalty programs.
  - name: Bookings APIs
    description: Service booking, staff scheduling, resources, and pricing plan management.
  - name: Headless Commerce
    description: Use Wix as a backend commerce engine with a custom frontend on any
      framework.
  - name: App Marketplace
    description: Build and publish apps to the Wix App Market using OAuth 2.0 and
      webhooks.
  - name: Wix MCP Server
    description: Model Context Protocol server that bridges AI clients to Wix APIs
      and documentation.
  - name: JavaScript SDK
    description: Modular npm packages for accessing Wix capabilities from JavaScript
      applications.
  - name: Velo by Wix
    description: Full-stack JavaScript development platform for adding custom functionality
      to Wix sites.
- type: UseCases
  data:
  - name: Custom eCommerce Storefront
    description: Build a headless storefront with custom UI while using Wix for catalog,
      orders, and payments.
  - name: App Development
    description: Develop and publish apps to the Wix App Market that install on Wix
      sites.
  - name: CRM Integration
    description: Sync contacts, members, and orders with external CRM systems via
      REST API.
  - name: Booking System
    description: Build custom booking experiences for service businesses using Wix
      Bookings API.
  - name: AI-Powered Site Management
    description: Use the Wix MCP Server to manage Wix sites through AI assistants
      and agents.
- type: Integrations
