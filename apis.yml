aid: wix
name: Wix
description: Wix is a cloud-based web development platform that allows users to create
  professional websites and online businesses. The Wix developer platform provides
  a comprehensive REST API, JavaScript SDK, and CLI for building custom apps, headless
  storefronts, and site extensions across eCommerce, CRM, bookings, blog, events,
  and more. Developers can customize Wix sites, build marketplace apps, and integrate
  Wix capabilities into any frontend.
type: Index
position: Consumer
access: 3rd-Party
