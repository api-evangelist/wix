  messageBindings:
    WixWebhookHttp:
      http:
        bindingVersion: '0.2.0'
        method: POST
        headers:
          type: object
          properties:
            Content-Type:
              type: string
              const: application/jwt
            Digest:
              type: string
              description: Optional digest header used by Wix to assist verification.

  schemas:
    WixWebhookEnvelope:
      type: object
      description: |
        The decoded body of the JWT delivered by Wix. The raw HTTP body is the JWT
        string. Once verified and decoded, the payload conforms to this schema.
        Reference: dev.wix.com webhook structure.
      required:
        - id
        - entityFqdn
        - slug
        - eventTime
      properties:
        id:
          type: string
          description: Unique event ID. Use to deduplicate retried deliveries.
        entityFqdn:
          type: string
          description: Fully qualified domain name of the entity (e.g. wix.ecom.v1.order).
        slug:
          type: string
          description: Event name slug (e.g. created, updated, deleted, purchased).
        entityId:
          type: string
          description: ID of the entity associated with the event.
        eventTime:
          type: string
          format: date-time
          description: Timestamp at which the event was emitted.
        originatedFrom:
          type: string
          description: Optional. Indicates the action that triggered the event.
        triggeredByAnonymizeRequest:
          type: boolean
          description: True if the event was triggered by a privacy regulation request (e.g. GDPR).
        actionEvent:
          type: object
          description: Present for action events; structure varies per resource and slug.
          additionalProperties: true
        createdEvent:
          type: object
          description: Present for create events; carries the newly created entity (structure varies per resource).
          additionalProperties: true
        updatedEvent:
          type: object
          description: Present for update events; carries the updated entity and may include previousEntity / updatedFields (structure varies per resource).
          additionalProperties: true
        deletedEvent:
          type: object
          description: Present for delete events; may carry the deleted entity (structure varies per resource).
          additionalProperties: true

    WixWebhookEnvelopeCreated:
      allOf:
        - $ref: '#/components/schemas/WixWebhookEnvelope'
        - type: object
          properties:
            slug:
              type: string
              const: created
            createdEvent:
              type: object
              description: Carries the newly created entity for the resource indicated by entityFqdn.
              additionalProperties: true

    WixWebhookEnvelopeUpdated:
      allOf:
        - $ref: '#/components/schemas/WixWebhookEnvelope'
        - type: object
          properties:
            slug:
              type: string
              const: updated
            updatedEvent:
              type: object
              description: Carries the updated entity and may include previousEntity / updatedFields.
              additionalProperties: true

    WixWebhookEnvelopeDeleted:
      allOf:
        - $ref: '#/components/schemas/WixWebhookEnvelope'
        - type: object
          properties:
            slug:
              type: string
              const: deleted
            deletedEvent:
              type: object
              description: May carry the deleted entity for the resource indicated by entityFqdn.
              additionalProperties: true

    WixWebhookEnvelopeAction:
      allOf:
        - $ref: '#/components/schemas/WixWebhookEnvelope'
        - type: object
          properties:
            actionEvent:
              type: object
              description: Carries data relevant to the action (e.g. purchased, canceled, fulfilled). Structure varies per resource and slug.
              additionalProperties: true

    WixLegacyNotification:
      type: object
      description: |
        Legacy Wix webhook envelope used by older endpoints (e.g. resource/schedule/category notifications).
        Delivered as a signed JWT. Exact payload fields vary; clients should verify the JWT and consult the
        linked Wix doc for the specific notification.
      additionalProperties: true

    WixAppInstanceWebhook:
      type: object
      description: |
        Webhook delivered for app-instance lifecycle events. Delivered as a signed JWT.
        Includes app instance identifiers and the event-specific payload (e.g. purchased plan,
        new plan, auto-renewal cancellation). See the linked Wix doc for the specific event body.
      additionalProperties: true
